    <!-- Lucide Icons -->

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        [x-cloak] {
            display: none !important;
        }


        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-10px) rotate(5deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* Diagonal Mask for Investment Section */
        .investment-mask {
            clip-path: polygon(0 0, 100% 0, 100% 85%, 50% 100%, 0 85%);
        }

        /* Modern Curvy Mask */
        .curvy-mask {
            border-radius: 40px 140px 40px 140px;
        }

        /* Dynamic Position Hover Image */
        .service-image-container {
            position: fixed;
            right: 15%;
            width: 180px;
            height: 240px;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
            opacity: 0;
            transform: translate(0, -50%) rotate(0deg) scale(0.8);
            transition:
                opacity 0.4s ease,
                transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                top 0.3s ease-out;
            clip-path: inset(100% 0 0 0);
        }

        .service-image-container.active {
            opacity: 1;
            transform: translate(0, -50%) rotate(-45deg) scale(1);
            clip-path: inset(0% 0 0 0);
        }

        .service-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: rotate(45deg) scale(1.5);
        }

        .service-description {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.5s ease, opacity 0.5s ease, margin-top 0.5s ease;
        }

        .group:hover .service-description {
            max-height: 200px;
            opacity: 1;
            margin-top: 1.5rem;
        }

        .custom-mask {
            clip-path: polygon(0% 0%, 75% 0%, 100% 15%, 100% 100%, 0% 100%);
        }
    </style>
</head>

            if (i < this.fullText.length) {
                this.typedText += this.fullText.charAt(i);
                i++;
            } else {
                clearInterval(interval);
                setTimeout(() => this.initTyping(), 3000); 
            }

    handleHover(img, event) {
        this.activeServiceImg = img;
        this.showHoverImg = true;

    <script>
        const words = ["Startups", "Enterprises", "Innovators", "Global Brands"];
        const typingElement = document.getElementById("typing-text");

        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function typeEffect() {
            const currentWord = words[wordIndex];

            if (!isDeleting) {
                typingElement.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
                if (charIndex === currentWord.length) {
                    setTimeout(() => isDeleting = true, 1200);
                }
            } else {
                typingElement.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
                if (charIndex === 0) {
                    isDeleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                }
            }

            setTimeout(typeEffect, isDeleting ? 60 : 100);
        }
        typeEffect();
    </script>

    <!-- COUNTER SCRIPT -->
    <script>
        const counters = document.querySelectorAll(".count");
        let started = false;

        function startCounter() {
            if (started) return;
            started = true;

            counters.forEach(counter => {
                const target = +counter.dataset.target;
                let start = 0;
                const duration = 1800;
                const startTime = performance.now();

                function update(time) {
                    const progress = Math.min((time - startTime) / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 3);
                    counter.innerText = Math.floor(ease * target).toLocaleString();
                    if (progress < 1) requestAnimationFrame(update);
                    else counter.innerText = target.toLocaleString();
                }

                requestAnimationFrame(update);
            });
        }

        window.addEventListener("scroll", () => {
            const section = document.querySelector("section");
            const top = section.getBoundingClientRect().top;
            if (top < window.innerHeight - 150) startCounter();
        });
    </script>
